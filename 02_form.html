<!doctype html>
<html lang="ko">
    <head>
        <meta charset="UTF-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />
        <title>폼 실습</title>
    </head>
    <body>
        <h1>회원 가입 양식</h1>

        <!-- 기본적인 인풋-->
        <h2>그냥 인풋</h2>
        <input />
        <button>제출</button>
        <h2>폼 인풋</h2>
        <form>
            <!-- form으로 묶으면 하위 Input에서 enter치면 제출 처리(혹은 버튼 누르면)-->
            <!-- input에 name 안 붙여주면 주소창을 통해 전달 X -->
            <input /><br />
            <input name="username" />
            <button>제출</button>
        </form>
    </body>
</html>
