<!doctype html>
<html lang="ko" data-bs-theme="dark">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>로그인 - TFT.GG</title>
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css"
      rel="stylesheet"
    />
    <link
      rel="icon"
      type="image/png"
      href="./favicon-96x96.png?v=2"
      sizes="96x96"
    />
    <link rel="icon" type="image/svg+xml" href="./favicon.svg?v=2" />
    <link rel="shortcut icon" href="./favicon.ico?v=2" />
    <link
      rel="apple-touch-icon"
      sizes="180x180"
      href="./apple-touch-icon.png?v=2"
    />
    <link rel="manifest" href="./site.webmanifest?v=2" />
  </head>
  <body class="pt-5 d-flex flex-column min-vh-100 bg-dark">
    <!-- Navbar -->
    <nav
      class="navbar navbar-expand-lg bg-body-tertiary fixed-top shadow-sm border-bottom border-secondary"
    >
      <div class="container">
        <a class="navbar-brand fw-bold text-primary" href="06-2.html">TFT.GG</a>
        <button
          class="navbar-toggler"
          type="button"
          data-bs-toggle="collapse"
          data-bs-target="#navbarNav"
        >
          <span class="navbar-toggler-icon"></span>
        </button>
        <div class="collapse navbar-collapse" id="navbarNav">
          <ul class="navbar-nav ms-auto mb-2 mb-lg-0">
            <li class="nav-item">
              <a class="nav-link" href="06-2.html">메타 덱</a>
            </li>
            <li class="nav-item">
              <a class="nav-link" href="champion-tier.html">챔피언 티어</a>
            </li>
            <li class="nav-item">
              <a class="nav-link" href="item-stats.html">아이템 통계</a>
            </li>
          </ul>
          <a
            href="login.html"
            class="btn btn-primary ms-lg-3 mt-2 mt-lg-0 fw-bold"
            >로그인</a
          >
        </div>
      </div>
    </nav>

    <main
      class="container my-auto flex-grow-1 d-flex align-items-center justify-content-center"
    >
      <div
        class="card bg-body-tertiary border-secondary shadow-lg p-4"
        style="width: 100%; max-width: 400px"
      >
        <h3 class="text-center fw-bold text-primary mb-4">로그인</h3>
        <form>
          <div class="mb-3">
            <label for="emailInput" class="form-label">이메일 주소</label>
            <input
              type="email"
              class="form-control bg-dark text-white border-secondary"
              id="emailInput"
              placeholder="name@example.com"
            />
          </div>
          <div class="mb-3">
            <label for="passwordInput" class="form-label">비밀번호</label>
            <input
              type="password"
              class="form-control bg-dark text-white border-secondary"
              id="passwordInput"
            />
          </div>
          <div class="d-flex justify-content-between mb-4">
            <div class="form-check">
              <input class="form-check-input" type="checkbox" id="rememberMe" />
              <label class="form-check-label" for="rememberMe"
                >로그인 유지</label
              >
            </div>
            <a href="#" class="text-decoration-none text-info">비밀번호 찾기</a>
          </div>
          <button type="submit" class="btn btn-primary w-100 fw-bold">
            로그인
          </button>
        </form>
      </div>
    </main>

    <footer
      class="bg-body-tertiary text-light py-4 border-top border-secondary"
    >
      <div class="container text-center">
        <p class="mb-1 text-secondary">&copy; 2026 TFT.GG Example.</p>
      </div>
    </footer>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"></script>
  </body>
</html>
