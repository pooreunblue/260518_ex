<!DOCTYPE html>
<html lang="ko">
    <head>
        <meta charser="UTF-8"/>
        <meta name="viewport  content="width=device-width", initial-scale="1.0" />
        <title>메인 태그</title>
    </head>
    <body>
        <!--제목, 헤드라인-->
        <h1>헤드라인 1</h1>
        <h2>헤드라인 2</h2>
        <h3>헤드라인 3</h3>
        <h4>헤드라인 4</h4>
        <h5>헤드라인 5</h5>
        <h6>헤드라인 6</h6>
        <br>이렇게 직접 씁니까?
        <p>문단을 의미</p>
        <!-- shift enter : 문단 내 줄바꿈 -->
        바로 붙여서 <br />
        표현
        <p>확실히 구분 되기 위해 위 아래 여백으로 구분</p>
        <p>확실히 구분 되기 위해 위 아래 여백으로 구분</p>
        <p>p 태그는 <br />과<br/>혼용 가능</p>
        <!--엔터티 (&lt;, &gt;)-->
        <p>태그는 &lt; br /&gt;과 <br />혼용가능</p>
        <p>태그의 경우에는 일반 문장에서 넣으면 요소 취급</p>
        <!--hr-->
        <hr />
        <p>가로 구분선 (hr)</p>
        <p>
            strong
            <strong>강조</strong>
            볼드 처리
        </p>
        <br /><br /><br />
        <!-- 목록 (순서(order)가 있는 목록, 순서가 있는 목록) -->
        <ol>
            <!--리스트 li-->
            <li>세수하기</li>
            <li>양치하기</li>
            <li>커피마시기</li>
        </ol>
        <!-- shift + 방향키로 범위 지정, alt + 방향키로 지정한 범위를 이동, alt+shift로 지정한 범위를 복사 -->
        <ul>
            <li>로또사기</li>
            <li>주식사기</li>
            <li>연금복권사기</li>
        </ul>
        </body>
</html>
